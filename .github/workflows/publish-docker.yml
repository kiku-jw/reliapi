name: Publish Docker

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check DOCKERHUB_TOKEN
        id: check-token
        run: |
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DOCKERHUB_TOKEN not set, skipping publish"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract version from tag
        if: steps.check-token.outputs.skip != 'true'
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Get Docker image name
        if: steps.check-token.outputs.skip != 'true'
        id: image
        run: |
          IMAGE=$(python3 -c "import yaml; print(yaml.safe_load(open('product.yaml'))['docker']['image'])")
          DOCKERFILE=$(python3 -c "import yaml; print(yaml.safe_load(open('product.yaml'))['docker']['dockerfile'])")
          echo "IMAGE=$IMAGE" >> $GITHUB_OUTPUT
          echo "DOCKERFILE=$DOCKERFILE" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        if: steps.check-token.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check-token.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.check-token.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.image.outputs.DOCKERFILE }}
          push: true
          tags: |
            ${{ steps.image.outputs.IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ steps.image.outputs.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Skip notice
        if: steps.check-token.outputs.skip == 'true'
        run: echo "::notice::Docker publish skipped - DOCKERHUB_TOKEN not configured"
