name: Publish NPM

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check NPM_TOKEN
        id: check-token
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "NPM_TOKEN not set, skipping publish"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.check-token.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up Python
        if: steps.check-token.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Java
        if: steps.check-token.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        if: steps.check-token.outputs.skip != 'true'
        run: |
          pip install -r requirements-dev.txt
          npm install -g @openapitools/openapi-generator-cli

      - name: Generate OpenAPI
        if: steps.check-token.outputs.skip != 'true'
        run: python scripts/generate_openapi.py

      - name: Generate JS SDK
        if: steps.check-token.outputs.skip != 'true'
        run: bash scripts/generate_sdk.sh js

      - name: Build SDK
        if: steps.check-token.outputs.skip != 'true'
        working-directory: sdk/js
        run: |
          npm install
          npm run build

      - name: Publish to NPM
        if: steps.check-token.outputs.skip != 'true'
        working-directory: sdk/js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Skip notice
        if: steps.check-token.outputs.skip == 'true'
        run: echo "::notice::NPM publish skipped - NPM_TOKEN not configured"
